---
# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation
# all, none, or list of linter keys

# If you use ENABLE variable, all other languages/formats/tooling-formats will
# be disabled by default
# Have decided not to enable the Python linter as has been recommended in point 7
# in the [python template readme](https://github.com/ONSdigital/ons-python-template#3-megalinter)
ENABLE:
  - ACTION
  - BASH
  - DOCKERFILE
  - EDITORCONFIG
  - JSON
  - JAVASCRIPT
  - MAKEFILE
  - MARKDOWN
  - REPOSITORY
  - YAML

DISABLE_LINTERS:
  - JAVASCRIPT_STANDARD # Disabled because its rules conflict with our rules set up in ESLint

FORMATTERS_DISABLE_ERRORS: false # Ensures code is actually fixable when using `make megalint-apply`
SHOW_ELAPSED_TIME: true # Displays execution time for each linter
FLAVOR_SUGGESTIONS: false # Disables suggestions to use different MegaLinter flavors

# ESLint v10 flat-config workaround: install project deps before running MegaLinter via CI
JAVASCRIPT_ES_PRE_COMMANDS:
  - command: npm ci --include=dev
    cwd: workspace
    continue_if_failed: false
JAVASCRIPT_ES_CLI_EXECUTABLE: [node_modules/.bin/eslint]

ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN
